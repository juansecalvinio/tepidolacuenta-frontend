<!doctype html>
<html lang="es" data-theme="black">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta
      name="description"
      content="Tus clientes piden la cuenta escaneando el QR de la mesa y vos recibís la solicitud al instante. Sin apps."
    />
    <title>tepidolacuenta</title>
  </head>
  <body>
    <script>
      // Aplica el tema y el color primary guardados antes de pintar (anti-FOUC)
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "black" || t === "white") {
            document.documentElement.setAttribute("data-theme", t);
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute("content", t === "white" ? "#fafafa" : "#1a1a1a");
          }
        } catch (e) {}
        // Color primary (mirror de src/ui/utils/primaryColor.ts)
        try {
          var PRIMARY = {
            amber: ["oklch(83% 0.128 66.29)", "oklch(14% 0 0)"],
            emerald: ["oklch(80% 0.14 162)", "oklch(14% 0 0)"],
            indigo: ["oklch(58% 0.2 270)", "oklch(98% 0 0)"],
          };
          var raw = localStorage.getItem("tplc-preferences");
          var color = raw && JSON.parse(raw).state.primaryColor;
          if (color && PRIMARY[color]) {
            document.documentElement.style.setProperty("--color-primary", PRIMARY[color][0]);
            document.documentElement.style.setProperty("--color-primary-content", PRIMARY[color][1]);
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/ui/main.tsx"></script>
  </body>
</html>
