<!doctype html>
<html lang="es" data-theme="black">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap"
    />
    <meta
      name="description"
      content="Tus clientes piden la cuenta escaneando el QR de la mesa y vos recibís la solicitud al instante. Sin apps."
    />
    <title>tepidolacuenta</title>
  </head>
  <body>
    <script>
      // Aplica el tema y el color primary guardados antes de pintar (anti-FOUC)
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "black" || t === "white") {
            document.documentElement.setAttribute("data-theme", t);
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute("content", t === "white" ? "#fafafa" : "#1a1a1a");
          }
        } catch (e) {}
        // Color primary: apunta --color-primary a la var de la paleta guardada
        // antes de pintar (anti-FOUC). Los VALORES viven en styles.css (:root);
        // acá solo validamos la key, sin repetir hex.
        try {
          var VALID = { amber: 1, emerald: 1, indigo: 1 };
          var raw = localStorage.getItem("tplc-preferences");
          var color = raw && JSON.parse(raw).state.primaryColor;
          if (color && VALID[color]) {
            document.documentElement.style.setProperty("--color-primary", "var(--primary-" + color + ")");
            document.documentElement.style.setProperty("--color-primary-content", "var(--primary-" + color + "-content)");
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/ui/main.tsx"></script>
  </body>
</html>
